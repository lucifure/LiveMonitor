kind = "api"
previewPath = "/"
title = "Stream Recorder"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 3000
name = "Stream Recorder"
paths = ["/"]

[services.development]
run = "cd /home/runner/workspace/stream-recorder && PORT=3000 python app.py"

[services.production]

[services.production.run]
args = ["python", "/home/runner/workspace/stream-recorder/app.py"]

[services.production.run.env]
PORT = "3000"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/api-server", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

[services.production.run.env]
PORT = "8080"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"
